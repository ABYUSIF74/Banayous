<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الشرف - مدرسة بنايوس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="honor.css"> </head>
<body>

<header>
    <h1><i class="fas fa-trophy" style="color: gold;"></i> لوحة شرف المتفوقين</h1>
    <p>أوائل الصف الأول الثانوي - الترم الأول</p>
</header>

<main class="honor-container">
    <div class="honor-card gold">
        <div class="rank">1</div>

        <h3>ملك محمد سرور</h3>
        <p class="score">المجموع: 588</p>
        <span class="badge">الأول </span>
    </div>

    <div class="honor-card silver">
        <div class="rank">2</div>
        
        <h3>سما محمد عاطف </h3>
        <p class="score">المجموع: 570</p>
        <span class="badge">الثاني</span>
    </div>

    <div class="honor-card bronze">
        <div class="rank">3</div>
        
        <h3>سلمي هيثم عفيفي</h3>
        <p class="score">المجموع: 564</p>
        <span class="badge">الثالث</span>
    </div>
    
</main>

<div style="text-align: center; margin-bottom: 50px;">
    <a href="index.html" class="back-btn" style="text-decoration: none; background: #333; color: white; padding: 12px 25px; border-radius: 30px;">
        <i class="fas fa-home"></i> العودة للرئيسية
    </a>
</div>

</body>
</html>
