<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | مدرسة بنايوس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Register Page Specific Styles */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 25s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 45px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header i {
            font-size: 60px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .auth-header h1 {
            font-size: 2rem;
            color: #333;
            margin: 0;
            font-weight: 700;
        }

        .auth-header p {
            color: #666;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .auth-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .auth-form .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .auth-form .form-control {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .auth-form .form-control:focus {
            border-color: #f093fb;
            background: white;
            box-shadow: 0 0 0 4px rgba(240, 147, 251, 0.1);
            outline: none;
        }

        .auth-form .form-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #f093fb;
            font-size: 1.1rem;
        }

        .auth-form select.form-control {
            padding: 12px 15px;
            cursor: pointer;
        }

        .auth-form select.form-control + .form-icon {
            display: none;
        }

        .auth-form .form-control:focus + .form-icon i {
            transform: translateY(-50%) scale(1.1);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 2px;
        }

        .password-strength .strength-weak {
            width: 33%;
            background: #f5576c;
        }

        .password-strength .strength-medium {
            width: 66%;
            background: #ff9f43;
        }

        .password-strength .strength-strong {
            width: 100%;
            background: #2ecc71;
        }

        .password-hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .terms-checkbox {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-left: 10px;
            margin-top: 3px;
            cursor: pointer;
            accent-color: #f093fb;
        }

        .terms-checkbox label {
            color: #666;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            line-height: 1.5;
        }

        .terms-checkbox a {
            color: #f093fb;
            text-decoration: none;
            font-weight: 600;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .auth-footer p {
            color: #666;
            margin: 0;
        }

        .auth-footer a {
            color: #f093fb;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #f5576c;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            z-index: 10;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        .back-home i {
            margin-left: 8px;
        }

        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 8s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 15%;
            left: 8%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 180px;
            height: 180px;
            top: 65%;
            left: 5%;
            animation-delay: 2.5s;
        }

        .shape:nth-child(3) {
            width: 140px;
            height: 140px;
            top: 25%;
            right: 8%;
            animation-delay: 5s;
        }

        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            bottom: 15%;
            right: 15%;
            animation-delay: 1.5s;
        }

        .shape:nth-child(5) {
            width: 70px;
            height: 70px;
            top: 45%;
            right: 35%;
            animation-delay: 3.5s;
        }

        .shape:nth-child(6) {
            width: 50px;
            height: 50px;
            bottom: 40%;
            left: 25%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(180deg); }
        }

        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #f093fb;
        }

        .notification {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 576px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Dark Mode */
        body.dark-mode .auth-card {
            background: rgba(30, 30, 30, 0.95);
        }

        body.dark-mode .auth-header h1 {
            color: #f0f0f0;
        }

        body.dark-mode .auth-header p {
            color: #aaa;
        }

        body.dark-mode .auth-form .form-label {
            color: #e0e0e0;
        }

        body.dark-mode .auth-form .form-control {
            background: #2a2a2a;
            border-color: #444;
            color: #f0f0f0;
        }

        body.dark-mode .auth-form .form-control:focus {
            background: #333;
            border-color: #f093fb;
        }

        body.dark-mode .select-wrapper .form-control {
            background: #2a2a2a;
        }

        body.dark-mode .terms-checkbox label {
            color: #aaa;
        }

        body.dark-mode .password-hint {
            color: #aaa;
        }

        body.dark-mode .auth-footer {
            border-top-color: #444;
        }

        body.dark-mode .auth-footer p {
            color: #aaa;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-right"></i> العودة للرئيسية
    </a>

    <div class="auth-container">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h1>إنشاء حساب جديد</h1>
                <p>انضم إلينا في مدرسة بنايوس</p>
            </div>

            <div id="notification" class="notification"></div>

            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">الاسم الأول</label>
                        <input type="text" class="form-control" id="firstName" required placeholder="الاسم">
                        <span class="form-icon"><i class="fas fa-user"></i></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">اسم العائلة</label>
                        <input type="text" class="form-control" id="lastName" required placeholder="العائلة">
                        <span class="form-icon"><i class="fas fa-users"></i></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">رقم الهاتف</label>
                        <input type="tel" class="form-control" id="phone" required placeholder="01xxxxxxxxx">
                        <span class="form-icon"><i class="fas fa-phone"></i></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">الصف الدراسي</label>
                        <select class="form-control" id="grade" required>
                            <option value="">اختر الصف</option>
                            <option value="1/1">الاول الثانوي - فصل 1/1</option>
                            <option value="1/2">الاول الثانوي - فصل 1/2</option>
                            <option value="1/3">الاول الثانوي - فصل 1/3</option>
                            <option value="1/4">الاول الثانوي - فصل 1/4</option>
                            <option value="1/5">الاول الثانوي - فصل 1/5</option>
                            <option value="teacher">مدرس</option>
                            <option value="parent">ولي أمر</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-control" id="email" required placeholder="example@school.com">
                    <span class="form-icon"><i class="fas fa-envelope"></i></span>
                </div>

                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••" oninput="checkPasswordStrength(this.value)">
                    <span class="form-icon"><i class="fas fa-lock"></i></span>
                    <span class="password-toggle" onclick="togglePassword('password', 'toggleIcon1')">
                        <i class="fas fa-eye" id="toggleIcon1"></i>
                    </span>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <p class="password-hint">8 أحرف على الأقل، حرف كبير وصغير ورقم</p>
                </div>

                <div class="form-group">
                    <label class="form-label">تأكيد كلمة المرور</label>
                    <input type="password" class="form-control" id="confirmPassword" required placeholder="••••••••">
                    <span class="form-icon"><i class="fas fa-check-circle"></i></span>
                    <span class="password-toggle" onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                        <i class="fas fa-eye" id="toggleIcon2"></i>
                    </span>
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        أوافق على <a href="#">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a>
                    </label>
                </div>

                <button type="submit" class="auth-btn" id="registerBtn">
                    <i class="fas fa-user-plus"></i> إنشاء الحساب
                </button>
            </form>

            <div class="auth-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('strengthBar');
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;
            
            strengthBar.className = 'strength-bar';
            
            if (strength <= 1) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 2) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const grade = document.getElementById('grade').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('terms').checked;

            // Validation
            if (password !== confirmPassword) {
                showNotification('كلمات المرور غير متطابقة', false);
                return;
            }

            if (password.length < 8) {
                showNotification('كلمة المرور يجب أن تكون 8 أحرف على الأقل', false);
                return;
            }

            if (!/[a-z]/.test(password) || !/[A-Z]/.test(password)) {
                showNotification('كلمة المرور يجب أن تحتوي على حروف كبيرة وصغيرة', false);
                return;
            }

            if (!/\d/.test(password)) {
                showNotification('كلمة المرور يجب أن تحتوي على رقم واحد على الأقل', false);
                return;
            }

            // Register user
            const userData = {
                firstName,
                lastName,
                fullName: `${firstName} ${lastName}`,
                phone,
                email,
                password,
                grade,
                role: grade === 'teacher' ? 'teacher' : (grade === 'parent' ? 'parent' : 'student'),
                createdAt: new Date().toISOString()
            };

            const result = register(userData);
            showNotification(result.message, result.success);

            if (result.success) {
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        }

        function showNotification(message, success) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification ' + (success ? 'success' : 'error');
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
